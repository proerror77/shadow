name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  go:
    name: Go API
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.changed_files, 'apps/api') ||
      github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: apps/api/go.mod
          cache-dependency-path: apps/api/go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...

  expo:
    name: Expo Mobile
    runs-on: ubuntu-latest
    if: hashFiles('apps/mobile/package.json') != ''
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Export (build check)
        run: pnpm expo export --platform all
