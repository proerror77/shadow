name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  python:
    name: Python Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Compile hermes and worker
        run: python -m py_compile apps/hermes/*.py apps/worker/*.py

  expo:
    name: Expo Mobile
    runs-on: ubuntu-latest
    if: hashFiles('apps/mobile/package.json') != ''
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm tsc --noEmit

      - name: Export (build check)
        run: pnpm expo export --platform all
